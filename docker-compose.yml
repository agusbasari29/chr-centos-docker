version: "3.8"

# =============================================================
# CHR + CentOS Docker Stack
# CHR = MikroTik RouterOS as VPN Gateway
# CentOS = Backend services (hanya bisa diakses via VPN)
#
# Arsitektur: satu network Docker (chr-net)
# CHR: 192.168.100.1  <- VPN gateway + Winbox/API
# CentOS: 192.168.100.10 <- backend, traffic keluar via CHR
# =============================================================

services:

  # -----------------------------------------------------------
  # Portainer - Docker Management UI
  # -----------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

  # -----------------------------------------------------------
  # MikroTik CHR - VPN Gateway
  # -----------------------------------------------------------
  chr:
    image: ${CHR_IMAGE:-evilfreelancer/docker-routeros}:${CHR_VERSION:-latest}
    container_name: mikrotik-chr
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun
    networks:
      chr-net:
        ipv4_address: ${CHR_IP:-192.168.100.1}
    ports:
      # Winbox
      - "8291:8291"
      # WireGuard
      - "${WG_PORT:-51820}:51820/udp"
      # L2TP
      - "${L2TP_PORT:-1701}:1701/udp"
      # PPTP
      - "${PPTP_PORT:-1723}:1723/tcp"
      # SSTP - uncomment jika diperlukan
      # - "${SSTP_PORT:-443}:443/tcp"
      # API
      - "8728:8728"
      # API-SSL
      - "8729:8729"
    volumes:
      - chr-data:/routeros
      - ./routeros/initial-config.rsc:/routeros/initial-config.rsc:ro
    environment:
      - ROUTEROS_PASSWORD=${CHR_ADMIN_PASSWORD:-changeme123}
    # Healthcheck diperpanjang karena CHR berjalan di QEMU emulasi (tanpa KVM)
    # Boot bisa memakan waktu 3-5 menit
    healthcheck:
      test: ["CMD", "ping", "-c1", "-W1", "127.0.0.1"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 300s

  # -----------------------------------------------------------
  # CentOS - Backend Services
  # -----------------------------------------------------------
  centos:
    build:
      context: .
      dockerfile: Dockerfile.centos
    container_name: centos-backend
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      chr-net:
        ipv4_address: ${CENTOS_IP:-192.168.100.10}
    dns:
      - ${CHR_IP:-192.168.100.1}
    command: >
      /bin/bash -c "
        ip route del default 2>/dev/null || true;
        ip route add default via ${CHR_IP:-192.168.100.1};
        tail -f /dev/null
      "
    volumes:
      - centos-data:/data
    depends_on:
      - chr

# -----------------------------------------------------------
# Networks - satu network, isolasi via firewall CHR
# -----------------------------------------------------------
networks:
  chr-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${CHR_SUBNET:-192.168.100.0/24}
          gateway: ${CHR_GATEWAY:-192.168.100.254}

# -----------------------------------------------------------
# Volumes
# -----------------------------------------------------------
volumes:
  chr-data:
    driver: local
  centos-data:
    driver: local
  portainer-data:
    driver: local
